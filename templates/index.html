<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guava Disease Detection</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f8f4;
        }

        .main-card{
            margin-top:40px;
            margin-bottom:40px;
            border-radius:20px;
            box-shadow:0px 4px 15px rgba(0,0,0,0.15);
        }

        .header{
            background:#198754;
            color:white;
            padding:20px;
            border-radius:20px 20px 0 0;
        }

        img{
            border-radius:10px;
            margin-top:15px;
            box-shadow:0px 2px 8px rgba(0,0,0,0.2);
        }

        .prediction-box{
            margin-top:20px;
            padding:20px;
            border-radius:10px;
            background:#e9f7ef;
        }

        .description-box{
            margin-top:20px;
            padding:15px;
            border-radius:10px;
            background:white;
            text-align:left;
        }

        ul{
            text-align:left;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card main-card">

        <div class="header text-center">

            <h1>🍈 Guava Disease Classification System</h1>
           
        </div>

        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">

                <div class="mb-3">

                    <label class="form-label">
                        Upload Guava Image
                    </label>

                    <input
                        class="form-control"
                        type="file"
                        name="image"
                        required>

                </div>

                <div class="text-center">

                    <button class="btn btn-success btn-lg">
                        Predict Disease
                    </button>

                </div>

            </form>

            {% if prediction %}

            <div class="prediction-box text-center">

                <h3>
                    Prediction:
                    <span class="badge bg-success">
                        {{ prediction }}
                    </span>
                </h3>

                <h4>
                    Confidence: {{ confidence }}%
                </h4>

                <img
                    src="{{ url_for('static', filename='uploads/' + filename) }}"
                    width="300">

                <div class="description-box">

                    <h4>Disease Description</h4>

                    <p>
                        {{ description }}
                    </p>

                    <hr>

                    <h4>Preventive Measures</h4>

                    <ul>
                        {% for item in prevention %}
                            <li>{{ item }}</li>
                        {% endfor %}
                    </ul>

                </div>

            </div>

            {% endif %}

        </div>

    </div>

</div>

</body>
</html>
